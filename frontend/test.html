<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Midolli-AI — Widget Test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .test-card {
      text-align: center;
      padding: 40px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #6d28d9, #4f46e5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p { font-size: 16px; opacity: 0.6; }
    .arrow {
      font-size: 42px;
      margin-top: 24px;
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(10px); }
    }
  </style>
</head>
<body data-theme="dark">
  <div class="test-card">
    <h1>Midolli-AI Widget Test</h1>
    <p>Click the floating button in the bottom-right corner.</p>
    <div class="arrow">↘</div>
  </div>

  <!-- Midolli-AI Widget -->
  <link rel="stylesheet" href="midolli-widget.css">
  <script src="midolli-widget.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      MidolliAI.init({
        apiUrl: 'http://localhost:8000',
        lang: 'fr',
        theme: 'dark'
      });
    });
  </script>
</body>
</html>
